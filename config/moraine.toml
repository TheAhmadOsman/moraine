[clickhouse]
url = "http://127.0.0.1:8123"
database = "moraine"
username = "default"
password = ""
timeout_seconds = 30.0
async_insert = true
wait_for_async_insert = true

[ingest]
batch_size = 4000
flush_interval_seconds = 0.5
state_dir = "~/.moraine/ingestor"
backfill_on_start = true
max_file_workers = 8
max_inflight_batches = 64
debounce_ms = 50
reconcile_interval_seconds = 30.0
heartbeat_interval_seconds = 5.0

[[ingest.sources]]
name = "codex"
harness = "codex"
enabled = true
glob = "~/.codex/sessions/**/*.jsonl"
watch_root = "~/.codex/sessions"

[[ingest.sources]]
name = "claude"
harness = "claude-code"
enabled = true
glob = "~/.claude/projects/**/*.jsonl"
watch_root = "~/.claude/projects"

[[ingest.sources]]
name = "kimi-cli"
harness = "kimi-cli"
enabled = true
glob = "~/.kimi/sessions/**/wire.jsonl"
watch_root = "~/.kimi/sessions"
format = "jsonl"

[[ingest.sources]]
name = "opencode"
harness = "opencode"
enabled = true
glob = "~/.local/share/opencode/opencode.db"
watch_root = "~/.local/share/opencode"
format = "opencode_sqlite"

[[ingest.sources]]
name = "factory-droid"
harness = "factory-droid"
enabled = true
glob = "~/.factory/sessions/**/*.jsonl"
watch_root = "~/.factory/sessions"
format = "factory_droid_jsonl"

# Hermes Agent LIVE sessions: one JSON file per conversation under
# ~/.hermes/sessions/ that the agent rewrites in place every turn.
# `format = "session_json"` opts into the rewrite-aware processor that emits
# only the newly appended messages on each watcher notify. Leave `format`
# unset and moraine will infer it from the `.json` glob.
[[ingest.sources]]
name = "hermes"
harness = "hermes"
enabled = true
glob = "~/.hermes/sessions/session_*.json"
watch_root = "~/.hermes/sessions"
format = "session_json"

# Hermes Agent offline trajectories: ShareGPT-compatible JSONL written by
# the datagen batch runner. Point at whatever directory your runner writes
# `trajectory_samples.jsonl` to. Uncomment and adjust when you need it.
# [[ingest.sources]]
# name = "hermes-trajectories"
# harness = "hermes"
# enabled = true
# glob = "~/trajectories/**/*.jsonl"
# watch_root = "~/trajectories"
# format = "jsonl"

[mcp]
max_results = 25
preview_chars = 320
default_context_before = 3
default_context_after = 3
default_include_tool_events = false
default_exclude_codex_mcp = true
async_log_writes = true
protocol_version = "2024-11-05"

[bm25]
k1 = 1.2
b = 0.75
default_min_score = 0.0
default_min_should_match = 1
max_query_terms = 32

# Ingest-time privacy policy is disabled by default. `encrypt_raw` encrypts
# the entire configured field with AES-256-GCM and requires a 32-byte key from
# either `encryption_key_env` or `encryption_key_file`. Backups do not include
# key material.
# [privacy]
# enabled = true
# redaction_policy_version = "1"
# raw_events_mode = "redact_raw"
# text_content_mode = "redact_raw"
# payload_json_mode = "redact_raw"
# tool_io_mode = "redact_raw"
# encryption_key_id = "local-main"
# encryption_key_env = "MORAINE_ENCRYPTION_KEY"
# encryption_key_file = "~/.moraine/keys/local-main.key"

# Source health can ignore exact known-bad historical ingest-error rows without
# deleting source transcripts or ClickHouse audit rows. Ignored rows remain
# visible in `moraine sources errors` and the monitor error drilldown.
# [[source_status.ignored_ingest_errors]]
# source_name = "pc-claude"
# source_file = "~/.moraine/imports/pc/claude/projects/project/session.jsonl"
# source_line_no = 10
# source_offset = 8015
# error_kind = "json_parse_error"
# reason = "Historical mirrored transcript row contains corrupted bytes."

# Remote import profiles mirror sessions from another machine into a local
# directory that can then be ingested as a source. `cadence` can be
# "manual", "on_start", "5min", "30min", or "1h". The sync command can execute
# rsync over SSH and records a versioned manifest under ~/.moraine/imports/.
# [imports.vm503]
# host = "vm503.local"
# remote_paths = ["~/.codex/sessions", "~/.claude/projects"]
# local_mirror = "~/.moraine/imports/vm503"
# include_patterns = ["**/*.jsonl", "**/*.json"]
# exclude_patterns = ["**/.git"]
# cadence = "manual"

[monitor]
host = "127.0.0.1"
port = 8080

[runtime]
root_dir = "~/.moraine"
logs_dir = "logs"
pids_dir = "run"
service_bin_dir = "~/.local/bin"
managed_clickhouse_dir = "~/.local/lib/moraine/clickhouse/current"
clickhouse_start_timeout_seconds = 30.0
healthcheck_interval_ms = 500
clickhouse_auto_install = true
clickhouse_version = "v25.12.5.44-stable"
start_monitor_on_up = true
start_mcp_on_up = false
